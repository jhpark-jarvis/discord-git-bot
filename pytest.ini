[pytest]
# Python 파일 검색 패턴
python_files = test_*.py

# 테스트 클래스 검색 패턴
python_classes = Test*

# 테스트 함수 검색 패턴
python_functions = test_*

# Asyncio 모드
asyncio_mode = auto

# 최소 Python 버전
minversion = 7.0

# 테스트 경로
testpaths = tests

# 마커 정의
markers =
    asyncio: async test
    integration: integration test
    unit: unit test
    slow: slow running test

# 콘솔 출력 옵션
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
